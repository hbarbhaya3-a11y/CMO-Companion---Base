# Cloud Build → Artifact Registry → Cloud Run for cco-os-frontend.
#
# Usage:
#   gcloud builds submit --config=cloudbuild.yaml \
#       --substitutions=_REGION=us-central1,_SERVICE=cco-frontend,_REPO=cco-os,_BACKEND_URL=https://cco-backend-xxx.a.run.app
#
# The backend URL is injected at container START (runtime) via
# docker-entrypoint.sh — no rebuild needed when backend URL changes.

substitutions:
  _REGION: us-central1
  _SERVICE: cco-frontend
  _REPO: cco-os
  _BACKEND_URL: https://cco-backend-PLACEHOLDER.a.run.app
  _IMAGE: ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}

steps:
  # Build — bakes a placeholder, runtime entrypoint substitutes real URL
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag=${_IMAGE}:${SHORT_SHA}
      - --tag=${_IMAGE}:latest
      - .

  # Push
  - id: push
    name: gcr.io/cloud-builders/docker
    args: [push, --all-tags, "${_IMAGE}"]

  # Deploy — VITE_API_BASE_URL env var triggers runtime backend URL injection
  - id: deploy
    name: gcr.io/google.cloud-sdk/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_IMAGE}:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=4
      - --concurrency=80
      - --set-env-vars=VITE_API_BASE_URL=${_BACKEND_URL}

images:
  - ${_IMAGE}:${SHORT_SHA}
  - ${_IMAGE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
