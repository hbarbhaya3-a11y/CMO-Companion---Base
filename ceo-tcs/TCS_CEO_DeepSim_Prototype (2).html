<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>TCS CXO Companion — Decision Lab · Deep Simulation</title>
<style>
:root{
  --bg:#f6f2ea; --bg2:#efe9dd; --panel:#ffffff; --ink:#1d1a15; --ink2:#3a352c;
  --muted:#8c8373; --muted2:#a99f8c; --line:#e8e1d2; --line2:#ded5c2;
  --gold:#b6811c; --gold-b:#e0a82e; --gold-soft:#f6ecd0; --gold-line:#ecd9a6;
  --green:#1f7a52; --green-soft:#e4f2ea; --green-line:#bfe0cf;
  --red:#b23524; --red-soft:#f8e6e2; --red-line:#f0cabf;
  --teal:#2ca58d; --blue:#2f6fd6; --blue-soft:#e8f0fb;
  --sb:#211913; --sb2:#160f0a;
  --serif:Georgia,"Times New Roman",serif;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --shadow:0 1px 2px rgba(40,30,10,.05),0 8px 24px rgba(40,30,10,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
.app{display:flex;min-height:100vh}
/* ---------- sidebar ---------- */
.sidebar{width:230px;flex:0 0 230px;background:linear-gradient(180deg,var(--sb),var(--sb2));color:#cfc4b2;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.brand{display:flex;align-items:center;gap:11px;padding:20px 18px 14px}
.brand .logo{width:38px;height:38px;border-radius:9px;background:var(--gold-b);color:#231a10;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;letter-spacing:.5px}
.brand .bt{font-weight:700;color:#f3ead8;font-size:14px;line-height:1.1}
.brand .bs{font-size:9px;letter-spacing:1.5px;color:#9c8f79;text-transform:uppercase;margin-top:2px}
.nav{margin-top:14px;display:flex;flex-direction:column;gap:3px;padding:0 12px}
.nav a{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;color:#b7ab97;text-decoration:none;font-size:13.5px;font-weight:500}
.nav a .ic{width:17px;text-align:center;opacity:.85}
.nav a:hover{background:rgba(255,255,255,.04);color:#e9dec9}
.nav a.active{background:rgba(224,168,46,.13);color:#f3ead8;box-shadow:inset 3px 0 0 var(--gold-b)}
.nav a.active .dot{margin-left:auto;width:6px;height:6px;border-radius:50%;background:var(--gold-b)}
.sb-foot{margin-top:auto;padding:16px;display:flex;align-items:center;gap:10px;border-top:1px solid rgba(255,255,255,.06)}
.sb-foot .av{width:34px;height:34px;border-radius:50%;background:var(--gold-b);color:#231a10;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px}
.sb-foot .nm{font-size:12.5px;color:#eadfca;font-weight:600}
.sb-foot .rl{font-size:9px;letter-spacing:1px;color:#9c8f79;text-transform:uppercase}
/* ---------- main ---------- */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 30px 4px}
.topbar .date{font-size:11px;letter-spacing:1.6px;color:var(--muted);text-transform:uppercase;font-weight:600}
.tick{display:flex;align-items:center;gap:9px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:7px 13px;font-size:12px;box-shadow:var(--shadow)}
.tick b{font-weight:700}.tick .dn{color:var(--red);font-weight:700}.tick .sep{color:var(--muted2)}
.wrap{padding:8px 30px 60px;max-width:1220px}
.kicker{font-size:11px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;font-weight:700;margin-bottom:8px}
h1.display{font-family:var(--serif);font-size:33px;font-weight:400;letter-spacing:-.5px;line-height:1.1}
h1.display .em{font-style:italic;color:var(--gold)}
.sub{color:var(--muted);font-size:14px;margin-top:8px;max-width:720px}
/* ---------- mode toggle ---------- */
.modebar{display:flex;align-items:center;gap:14px;margin:22px 0 8px}
.modebar .lbl{font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;font-weight:700}
.seg{display:inline-flex;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:4px;box-shadow:var(--shadow)}
.seg button{border:0;background:transparent;padding:7px 16px;border-radius:7px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;font-family:var(--sans)}
.seg button.on{background:var(--ink);color:#fff}
/* ---------- objective cards ---------- */
.count{font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;font-weight:700;margin:26px 0 12px}
.objs{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.obj{background:var(--panel);border:1px solid var(--line);border-radius:15px;padding:22px;box-shadow:var(--shadow);cursor:pointer;transition:.16s;position:relative;overflow:hidden}
.obj:hover{transform:translateY(-3px);box-shadow:0 14px 34px rgba(40,30,10,.13);border-color:var(--line2)}
.obj .cap{position:absolute;top:0;left:0;right:0;height:4px}
.obj .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.obj .icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px}
.obj .tag{font-size:9px;letter-spacing:1.5px;font-weight:700;text-transform:uppercase;padding:5px 9px;border-radius:20px;background:var(--bg2);color:var(--muted)}
.obj h3{font-size:18px;font-weight:700;letter-spacing:-.2px;margin-bottom:7px}
.obj p{color:var(--muted);font-size:12.5px;line-height:1.5;min-height:52px}
.obj .stats{display:flex;gap:16px;margin:16px 0 4px;padding-top:15px;border-top:1px solid var(--line)}
.obj .stat .k{font-size:9px;letter-spacing:1px;color:var(--muted2);text-transform:uppercase;font-weight:700}
.obj .stat .v{font-size:17px;font-weight:800;margin-top:3px;font-family:var(--serif)}
.obj .open{margin-top:16px;text-align:right;font-size:12px;font-weight:800;letter-spacing:1px;color:var(--gold);text-transform:uppercase}
/* ---------- wizard ---------- */
.crumb{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);margin:2px 0 16px;cursor:default}
.crumb a{color:var(--gold);text-decoration:none;font-weight:600;cursor:pointer}
.crumb b{color:var(--ink);font-weight:600}
.stepper{display:flex;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 20px;box-shadow:var(--shadow);margin-bottom:22px}
.stp{display:flex;align-items:center;gap:11px;cursor:pointer}
.stp .num{width:30px;height:30px;border-radius:50%;background:var(--bg2);color:var(--muted);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex:0 0 30px}
.stp .tx .a{font-size:9px;letter-spacing:1.5px;color:var(--muted2);text-transform:uppercase;font-weight:700}
.stp .tx .b{font-size:13.5px;font-weight:700;color:var(--ink2)}
.stp.active .num{background:var(--gold-b);color:#231a10}
.stp.done .num{background:var(--green);color:#fff}
.stp.active .tx .b{color:var(--ink)}
.stpline{flex:1;height:2px;background:var(--line);margin:0 14px}
.stpline.done{background:var(--green-line)}
/* ---------- panels & kpis ---------- */
.sechead{font-size:11px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;font-weight:700;margin:6px 0 6px}
h2.big{font-family:var(--serif);font-size:26px;font-weight:400;letter-spacing:-.3px;margin-bottom:5px}
.lead{color:var(--muted);font-size:13.5px;max-width:760px;margin-bottom:18px}
.pillrt{float:right;font-size:12px;font-weight:700}
.kpis{display:grid;gap:12px;margin-bottom:20px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:15px 16px;box-shadow:var(--shadow);border-top:3px solid var(--line2)}
.kpi.g{border-top-color:var(--green)}.kpi.r{border-top-color:var(--red)}.kpi.gold{border-top-color:var(--gold-b)}
.kpi .k{font-size:9.5px;letter-spacing:1.2px;color:var(--muted);text-transform:uppercase;font-weight:700}
.kpi .v{font-size:26px;font-weight:800;font-family:var(--serif);margin:5px 0 3px;letter-spacing:-.5px}
.kpi .s{font-size:11.5px;color:var(--muted)}
.kpi .s.pos{color:var(--green);font-weight:600}.kpi .s.neg{color:var(--red);font-weight:600}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;box-shadow:var(--shadow);margin-bottom:18px}
.card .ch{font-size:11px;letter-spacing:1.5px;color:var(--gold);text-transform:uppercase;font-weight:700;margin-bottom:3px;display:flex;justify-content:space-between;align-items:center}
.card .ct{font-family:var(--serif);font-size:19px;margin-bottom:3px}
.card .cs{color:var(--muted);font-size:12.5px;margin-bottom:14px}
.badge{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 9px;border-radius:20px}
.badge.warn{background:var(--red-soft);color:var(--red)}
.badge.ok{background:var(--green-soft);color:var(--green)}
.badge.gold{background:var(--gold-soft);color:var(--gold)}
/* tables */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-size:9.5px;letter-spacing:1px;color:var(--muted2);text-transform:uppercase;font-weight:700;padding:9px 8px;border-bottom:1px solid var(--line)}
.tbl td{padding:11px 8px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle}
.tbl tr:last-child td{border-bottom:0}
.tbl .nm{font-weight:700}.tbl .subt{font-size:10.5px;color:var(--muted);font-weight:500}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:7px;vertical-align:middle}
.dot.r{background:var(--red)}.dot.g{background:var(--green)}.dot.y{background:var(--gold-b)}
.mono{font-variant-numeric:tabular-nums}
.pos{color:var(--green);font-weight:700}.neg{color:var(--red);font-weight:700}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.grid2a{display:grid;grid-template-columns:1.35fr 1fr;gap:18px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media(max-width:1050px){.objs{grid-template-columns:1fr}.grid2,.grid2a,.grid3,.grid4{grid-template-columns:1fr}}
/* intelligence */
.why .chips{display:flex;flex-direction:column;gap:9px;margin-top:12px}
.wchip{display:flex;gap:11px;align-items:flex-start;padding:10px 12px;background:var(--bg2);border-radius:9px}
.wchip .tp{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:5px;background:#fff;border:1px solid var(--line);color:var(--muted);flex:0 0 auto;margin-top:1px}
.wchip .tx{font-size:12.5px;color:var(--ink2)}
.analog{background:linear-gradient(180deg,var(--green-soft),#fff);border:1px solid var(--green-line)}
.analog .name{font-family:var(--serif);font-size:20px;color:var(--green);margin-bottom:2px}
.obox{background:#fff;border:1px solid var(--green-line);border-radius:10px;padding:12px;font-size:12px;color:var(--ink2)}
.play{background:linear-gradient(180deg,var(--gold-soft),#fff);border:1px solid var(--gold-line)}
.play ul{list-style:none;display:flex;flex-direction:column;gap:9px;margin-top:6px}
.play li{display:flex;gap:9px;font-size:12.8px;color:var(--ink2)}
.play li:before{content:"";width:7px;height:7px;border-radius:50%;background:var(--gold-b);margin-top:6px;flex:0 0 7px}
.mbox{background:#fff;border:1px solid var(--gold-line);border-radius:10px;padding:14px}
.mrow{display:flex;justify-content:space-between;padding:6px 0;font-size:12.5px;border-bottom:1px dashed var(--line)}
.mrow:last-child{border-bottom:0}.mrow b{font-family:var(--serif);font-size:14px}
.conf{display:flex;gap:3px;margin:8px 0}
.conf i{width:22px;height:9px;border-radius:2px;background:var(--green)}
.conf i.off{background:var(--line2)}
.next{background:linear-gradient(90deg,#fff,var(--gold-soft));border:1px solid var(--gold-line);border-radius:14px;padding:20px 22px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:.15s}
.next:hover{box-shadow:0 10px 26px rgba(180,130,20,.16)}
.next .nk{font-size:10px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;font-weight:700}
.next .nt{font-family:var(--serif);font-size:20px;margin:3px 0}
.next .nd{font-size:12px;color:var(--muted);max-width:640px}
.next .arw{font-size:26px;color:var(--gold)}
/* workbench levers */
.lvgroup{margin-bottom:8px}
.lvhead{display:flex;justify-content:space-between;font-size:11px;letter-spacing:1.5px;color:var(--gold);text-transform:uppercase;font-weight:700;padding:12px 4px 8px}
.lv{display:grid;grid-template-columns:1.5fr .8fr 1.6fr;gap:12px;align-items:center;padding:11px 4px;border-top:1px solid var(--line)}
.lv .ln{font-size:13px;font-weight:600}.lv .ls{font-size:10.5px;color:var(--muted)}
.lv .asis{font-size:12px;color:var(--muted)}
.lv .tobe{font-size:13px;font-weight:700;color:var(--gold)}
.lv .tobe .rec{display:block;font-size:9px;letter-spacing:.5px;color:var(--green);font-weight:700}
.lv input[type=range]{width:100%;-webkit-appearance:none;height:5px;border-radius:4px;background:var(--line2);outline:none}
.lv input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--gold-b);border:3px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2);cursor:pointer}
.lv input[type=range]::-moz-range-thumb{width:15px;height:15px;border-radius:50%;background:var(--gold-b);border:3px solid #fff;cursor:pointer}
.constraints .cr{margin-bottom:13px}
.constraints .cl{display:flex;justify-content:space-between;font-size:11.5px;margin-bottom:5px}
.constraints .bar{height:7px;border-radius:5px;background:var(--line2);position:relative;overflow:hidden}
.constraints .bar>i{position:absolute;left:0;top:0;bottom:0;border-radius:5px;background:var(--gold-b)}
.constraints .bar>.mk{position:absolute;top:-3px;width:2px;height:13px;background:var(--ink)}
.constraints .cx{font-size:9.5px;color:var(--muted);margin-top:3px}
.qr{background:var(--gold-soft);border:1px solid var(--gold-line);border-radius:12px;padding:16px}
.qr .qh{font-size:10px;letter-spacing:1.5px;color:var(--gold);text-transform:uppercase;font-weight:700;margin-bottom:10px}
.qr .qg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.qr .qk{font-size:9.5px;letter-spacing:.5px;color:var(--muted);text-transform:uppercase;font-weight:700}
.qr .qv{font-family:var(--serif);font-size:21px;font-weight:700;margin-top:2px}
.runbar{display:flex;align-items:center;justify-content:space-between;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 20px;box-shadow:var(--shadow);margin-top:8px}
.btn{border:0;border-radius:10px;padding:11px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--sans);display:inline-flex;align-items:center;gap:8px}
.btn.gold{background:var(--gold-b);color:#231a10}.btn.gold:hover{background:#d19b1f}
.btn.dark{background:var(--ink);color:#fff}.btn.ghost{background:#fff;border:1px solid var(--line2);color:var(--ink2)}
.btn.big{padding:13px 26px;font-size:14px}
.presets{display:flex;gap:8px}
.preset{border:1px solid var(--line2);background:#fff;border-radius:8px;padding:8px 13px;font-size:12px;font-weight:600;cursor:pointer;color:var(--ink2)}
.preset.on{background:var(--ink);color:#fff;border-color:var(--ink)}
/* options */
.opts{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:18px}
.opt{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow);cursor:pointer;position:relative;transition:.15s}
.opt:hover{border-color:var(--line2)}
.opt.sel{border-color:var(--gold-b);box-shadow:0 0 0 2px var(--gold-b) inset,0 10px 26px rgba(180,130,20,.14)}
.opt .oh{font-size:9.5px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;font-weight:700;display:flex;justify-content:space-between;align-items:center}
.opt .otag{background:var(--gold-b);color:#231a10;padding:3px 8px;border-radius:20px;font-size:9px}
.opt .on{font-family:var(--serif);font-size:20px;margin:4px 0 2px}
.opt .od{font-size:11.5px;color:var(--muted);min-height:32px}
.opt .og{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0;padding-top:12px;border-top:1px solid var(--line)}
.opt .ok{font-size:9px;letter-spacing:.5px;color:var(--muted2);text-transform:uppercase;font-weight:700}
.opt .ov{font-size:17px;font-weight:800;font-family:var(--serif);margin-top:2px}
.opt .moves{list-style:none;font-size:11px;color:var(--ink2);display:flex;flex-direction:column;gap:5px;border-top:1px solid var(--line);padding-top:10px}
.opt .moves li:before{content:"· ";color:var(--gold)}
.opt .risk{margin-top:10px;font-size:11px;font-weight:700}
/* outcomes */
.applied{background:linear-gradient(90deg,var(--green-soft),#fff);border:1px solid var(--green-line);border-radius:14px;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.applied .at{font-size:10px;letter-spacing:2px;color:var(--green);text-transform:uppercase;font-weight:700}
.applied .av{font-size:14px;margin-top:3px}.applied .av b{font-family:var(--serif);color:var(--green);font-size:17px}
.timeline{display:flex;justify-content:space-between;margin-top:18px;position:relative}
.timeline:before{content:"";position:absolute;left:5%;right:5%;top:15px;height:2px;background:var(--line2)}
.tn{position:relative;text-align:center;flex:1;z-index:1}
.tn .c{width:30px;height:30px;border-radius:50%;background:#fff;border:2px solid var(--gold-b);color:var(--gold);font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 8px;font-size:13px}
.tn .d{font-size:9px;letter-spacing:1px;color:var(--muted2);text-transform:uppercase;font-weight:700}
.tn .l{font-size:12.5px;font-weight:700;margin:2px 0}
.tn .v{font-family:var(--serif);font-size:15px;font-weight:700}
.tn .x{font-size:10px;color:var(--muted);margin-top:3px;padding:0 6px}
.commit{display:flex;align-items:center;justify-content:space-between;background:linear-gradient(90deg,#fff,var(--gold-soft));border:1px solid var(--gold-line);border-radius:14px;padding:18px 22px;margin-top:20px}
.commit .ck{font-size:10px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;font-weight:700}
.commit .ct{font-family:var(--serif);font-size:18px;margin-top:2px}
.hidden{display:none!important}
.fadein{animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.legend{display:flex;gap:16px;font-size:10.5px;color:var(--muted);margin-top:8px;flex-wrap:wrap}
.legend i{display:inline-block;width:16px;height:3px;border-radius:2px;margin-right:5px;vertical-align:middle}
.hist rect{transition:.2s}
.foot-note{font-size:10.5px;color:var(--muted2);margin-top:10px}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><div class="logo">TCS</div><div><div class="bt">CXO Companion</div><div class="bs">Powered by TwinX™</div></div></div>
    <nav class="nav">
      <a href="#"><span class="ic">◇</span> Home</a>
      <a href="#"><span class="ic">◈</span> Signals</a>
      <a href="#"><span class="ic">❑</span> Memory</a>
      <a href="#" class="active"><span class="ic">✦</span> Decision Lab <span class="dot"></span></a>
    </nav>
    <div class="sb-foot"><div class="av">KK</div><div><div class="nm">K Krithivasan</div><div class="rl">CEO &amp; MD</div></div></div>
  </aside>
  <main class="main">
    <div class="topbar">
      <div class="date">Wednesday, July 8, 2026</div>
      <div class="tick"><b>BSE: TCS</b><span>₹3,205.90</span><span class="dn">▼0.6%</span><span class="sep">|</span><span style="color:var(--muted)">Closed 8 Jul, 15:30 IST</span></div>
    </div>
    <div class="wrap" id="root"></div>
  </main>

const root=document.getElementById('root');
function clamp(x,a,b){return Math.max(a,Math.min(b,x));}
let cur={flow:null,step:0,acct:null,lev:{},opts:false,sel:null,mc:null,preset:null,scenario:'base'};

function lvfmt(l,v){v=+v;
  switch(l.fk){
    case 'pct':return v+'%'; case 'int':return ''+v; case 'k':return v+'K';
    case 'util':return v.toFixed(1)+'%'; case 'idx':return l.labels[Math.round(v)];
    case 'subc':return v==0?'As-Is':'−'+(v*4)+'%'; default:return ''+v;}
}
function yfmt(kind,v){return kind==='usd_b'?('$'+v.toFixed(1)+'B'):(v+'%');}
function findLever(f,id){let r=null;f.workbench.groups.forEach(g=>g.levers.forEach(l=>{if(l.id===id)r=l;}));return r;}

/* ---------- charts ---------- */
function lineChart(cfg,W,Hh){
  const padL=48,padR=16,padT=14,padB=26,pw=W-padL-padR,ph=Hh-padT-padB;
  const n=cfg.xlabels.length,ymin=cfg.ymin,ymax=cfg.ymax;
  const X=i=>padL+(n<=1?0:i*pw/(n-1)),Y=v=>padT+ph-(v-ymin)/(ymax-ymin)*ph;
  let g='';
  for(let t=0;t<=4;t++){const v=ymin+(ymax-ymin)*t/4,y=Y(v);
    g+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#eee6d7"/>`;
    g+=`<text x="${padL-8}" y="${y+3}" text-anchor="end" font-size="9" fill="#a99f8c">${yfmt(cfg.ykind,v)}</text>`;}
  cfg.xlabels.forEach((l,i)=>{g+=`<text x="${X(i)}" y="${Hh-8}" text-anchor="middle" font-size="9" fill="#a99f8c">${l}</text>`;});
  cfg.series.forEach(s=>{let d='',pen=false;
    s.pts.forEach((v,i)=>{if(v==null){pen=false;return;}d+=(pen?'L':'M')+X(i)+' '+Y(v)+' ';pen=true;});
    g+=`<path d="${d}" fill="none" stroke="${s.color}" stroke-width="2.4" ${s.dash?`stroke-dasharray="${s.dash}"`:''} stroke-linecap="round" stroke-linejoin="round"/>`;
    s.pts.forEach((v,i)=>{if(v!=null)g+=`<circle cx="${X(i)}" cy="${Y(v)}" r="3" fill="${s.color}"/>`;});});
  const leg=cfg.series.map(s=>`<span><i style="background:${s.color}"></i>${s.name}</span>`).join('');
  return `<svg viewBox="0 0 ${W} ${Hh}" width="100%" style="display:block">${g}</svg><div class="legend">${leg}</div>`;
}
function histogram(vals,W,Hh){
  const lo=-2,hi=4,bins=24,padL=8,padR=8,padT=10,padB=24,pw=W-padL-padR,ph=Hh-padT-padB;
  const cnt=new Array(bins).fill(0);
  vals.forEach(v=>{let b=Math.floor((clamp(v,lo,hi-1e-6)-lo)/(hi-lo)*bins);cnt[b]++;});
  const mx=Math.max(...cnt),bw=pw/bins;let g='';
  cnt.forEach((c,i)=>{const h=c/mx*ph,x=padL+i*bw,y=padT+ph-h,mid=lo+(i+0.5)/bins*(hi-lo);
    const col=mid<0?'#d9b2ab':(mid<1.2?'#e6cf9a':'#9cc9b4');
    g+=`<rect x="${x+1}" y="${y}" width="${bw-2}" height="${h}" rx="2" fill="${col}"/>`;});
  for(let v=lo;v<=hi;v+=1){const x=padL+(v-lo)/(hi-lo)*pw;
    g+=`<line x1="${x}" y1="${padT+ph}" x2="${x}" y2="${padT+ph+4}" stroke="#c9bfad"/>`;
    g+=`<text x="${x}" y="${Hh-6}" text-anchor="middle" font-size="9" fill="#a99f8c">${v>0?'+':''}${v}pp</text>`;}
  const sorted=[...vals].sort((a,b)=>a-b),pct=p=>sorted[Math.floor(p*sorted.length)];
  [['P10',pct(0.1),'#8c8373'],['P50',pct(0.5),'#1d1a15'],['P90',pct(0.9),'#8c8373']].forEach(([lab,v,c])=>{
    const x=padL+(clamp(v,lo,hi)-lo)/(hi-lo)*pw;
    g+=`<line x1="${x}" y1="${padT}" x2="${x}" y2="${padT+ph}" stroke="${c}" stroke-width="${lab=='P50'?2:1}" stroke-dasharray="3 3"/>`;
    g+=`<text x="${x}" y="${padT-2}" text-anchor="middle" font-size="8.5" font-weight="700" fill="${c}">${lab}</text>`;});
  return `<svg viewBox="0 0 ${W} ${Hh}" width="100%" style="display:block">${g}</svg>`;
}
function gauss(){let u=0,v=0;while(!u)u=Math.random();while(!v)v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}
function runMC(strength,diff,runs){
  const mean=-0.2+strength*2.9-diff*1.9,sd=0.45+diff*0.7+(1-strength)*0.15,out=new Array(runs);
  for(let i=0;i<runs;i++)out[i]=mean+gauss()*sd;
  const sorted=[...out].sort((a,b)=>a-b),pct=p=>sorted[Math.floor(p*sorted.length)];
  const thr={"Accenture":1.5,"Infosys":0.8,"Cognizant":0.3,"GCC threat":0.6},wp={};
  for(const k in thr){wp[k]=Math.round(out.filter(v=>v>thr[k]).length/runs*100);}
  const p50=pct(0.5),captured=clamp(p50/2.6,0,1)*2.1,gapc=clamp(p50/2.6,0,1)*100*0.9;
  return {out,p10:pct(0.1),p50,p90:pct(0.9),wp,captured,gapc,mean};
}

function chartCard(c,label){return `<div class="card"><div class="ch"><span>${label||'PLAN VS ACTUAL · TRAJECTORY'}</span><span class="badge ${c.badgeCls}">${c.badge}</span></div>
  <div class="ct">${c.title}</div><div class="cs">${c.sub}</div>${lineChart(c,860,240)}</div>`;}
function cellHtml(c){return `<span class="${c[1]==='neg'?'neg':c[1]==='pos'?'pos':'mono'}">${c[0]}</span>`;}

/* ---------- FLOW SHELL ---------- */
const STEPS=[["01","Snapshot"],["02","Intelligence"],["03","Workbench"],["04","Outcomes"]];
function openFlow(id){cur={flow:id,step:0,acct:FLOWS[id].firstUnder,lev:{},opts:false,sel:null,mc:null,preset:null,scenario:'base'};
  const f=FLOWS[id];
  if(f.workbench)f.workbench.groups.forEach(g=>g.levers.forEach(l=>cur.lev[l.id]=l.val));
  if(f.wargameWB)f.wargameWB.levers.forEach(l=>cur.lev[l.id]=0.5);
  renderFlow();}
function openIntel(flow,key){cur.flow=flow;cur.acct=key;cur.step=1;renderFlow();window.scrollTo({top:0,behavior:'smooth'});}
function goStep(s){const f=FLOWS[cur.flow];
  if(s===3){if(f.wargameWB&&!cur.mc)runMonteCarlo();if(f.options&&cur.sel==null)return;}
  cur.step=s;renderFlow();window.scrollTo({top:0,behavior:'smooth'});}
function jump(i){if(i<=cur.step||i===cur.step+1)goStep(i);}
function stepper(){return `<div class="stepper">`+STEPS.map((s,i)=>{
  const cls=i===cur.step?'active':(i<cur.step?'done':''),line=i<3?`<div class="stpline ${i<cur.step?'done':''}"></div>`:'';
  return `<div class="stp ${cls}" onclick="jump(${i})"><div class="num">${i<cur.step?'✓':s[0]}</div><div class="tx"><div class="a">Step ${s[0]}</div><div class="b">${s[1]}</div></div></div>${line}`;}).join('')+`</div>`;}
function renderFlow(){const f=FLOWS[cur.flow];let body='';
  if(cur.step===0)body=renderSnapshot(f);
  else if(cur.step===1)body=renderIntel(f);
  else if(cur.step===2)body=(f.wargameWB?renderWargameWB(f):renderWorkbench(f));
  else body=renderOutcomes(f);
  root.innerHTML=`<div class="crumb"><a onclick="renderLanding()">Decision Lab</a> / <b>${f.title}</b></div>${stepper()}<div class="fadein">${body}</div>`;
  if(cur.step===2&&!f.wargameWB)syncModel();
  if(cur.step===2&&f.wargameWB)syncStrength();
}

  const positive=a.group==='top';
  return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <div class="crumb" style="margin:0"><a onclick="goStep(0)">← Back to snapshot</a></div>${accountSwitcher(f)}</div>
    <div class="sechead">${f.id==='wargame'?'THREAT INTELLIGENCE':(f.id==='workforce'?'SKILL-POOL INTELLIGENCE':'ACCOUNT INTELLIGENCE')} · ${t.label}</div>

      <div class="ch"><span style="color:${positive?'var(--green)':'var(--red)'}">● ${t.whyTitle}</span><span class="cs" style="margin:0">factual root-cause · linked to live signals</span></div>
      <div style="font-size:13.5px;color:var(--ink2);line-height:1.6">${t.whyBody}</div>
      <div class="why"><div class="chips">${causal}</div></div></div>
    <div class="grid2a">
      <div class="card analog"><div class="ch"><span style="color:var(--green)">◆ ${positive?'REPLICATE THIS WIN':'LOOKALIKE ANALOG'}</span></div>
        <div class="name">${t.analogName}</div><div class="cs">${t.analogSub}</div>
        <div class="obox"><b>Outcome:</b> ${t.analogOutcome}</div>

      <div class="nd">${f.wargameWB?'Set TCS\u2019s competitive posture, choose a scenario, and run the Monte-Carlo simulation.':'Pre-loaded with the recommended lever configuration. Every slider updates the live modelled impact — then generate three optimized options.'}</div></div>
      <div class="arw">→</div></div>`;
}

/* ---------- model ---------- */
function computeModel(f){const acc={};
  f.workbench.groups.forEach(g=>g.levers.forEach(l=>{
    const frac=clamp((cur.lev[l.id]-l.min)/((l.rec-l.min)||1),0,1.35);
    for(const k in l.imp)acc[k]=(acc[k]||0)+l.imp[k]*frac;}));
  return acc;}
function readout(f,acc){
  if(f.id==='genai'){const r=Math.round(acc.rev||0);
    return {lift:"+$"+r+"M",cells:["+$"+r+"M",Math.min(100,Math.round(acc.gap||0))+"%","+"+(acc.win||0).toFixed(1)+"pp",((acc.margin||0)>=0?"+":"")+(acc.margin||0).toFixed(1)+"pp"]};}
  const ready=Math.round(62+(acc.ready||0));
  return {lift:ready+"%",cells:[((acc.attr||0)>=0?"+":"")+(acc.attr||0).toFixed(1)+"pp",ready+"%",(acc.subc||0).toFixed(0)+"%",((acc.margin||0)>=0?"+":"")+(acc.margin||0).toFixed(1)+"pp"]};}
function updateWB(f){
  f.workbench.groups.forEach(g=>g.levers.forEach(l=>{
    const sl=document.getElementById('sl_'+l.id);if(sl&&(''+sl.value)!==(''+cur.lev[l.id]))sl.value=cur.lev[l.id];
    const e=document.getElementById('tb_'+l.id);if(e)e.textContent=lvfmt(l,cur.lev[l.id]);
    const rc=document.getElementById('rc_'+l.id);if(rc)rc.style.visibility=(Math.abs(cur.lev[l.id]-l.rec)<1e-6)?'visible':'hidden';}));
  f.workbench.constraints.forEach((c,ci)=>{
    const fr=c.stage.map(id=>{const l=findLever(f,id);return clamp((cur.lev[id]-l.min)/((l.max-l.min)||1),0,1);});
    const fill=fr.reduce((a,b)=>a+b,0)/fr.length,mark=0.82;
    const bar=document.getElementById('cbar'+ci);
    if(bar){bar.style.width=(fill*100).toFixed(0)+'%';bar.style.background=fill>mark?'var(--red)':'var(--gold-b)';}
    const st=document.getElementById('cst'+ci);if(st){st.textContent=fill>mark?'over':'ok';st.style.color=fill>mark?'var(--red)':'var(--green)';}});}
function syncModel(){const f=FLOWS[cur.flow];updateWB(f);const ro=readout(f,computeModel(f));
  const hl=document.getElementById('heroLift');if(hl)hl.textContent=ro.lift;
  ro.cells.forEach((c,i)=>{const e=document.getElementById('qr'+i);if(e)e.textContent=c;});}
function setLever(id,v){cur.lev[id]=parseFloat(v);cur.applied=null;syncModel();}

/* ---------- STEP 3: WORKBENCH (genai / workforce) ---------- */
function renderWorkbench(f){const wb=f.workbench;
  const hero=wb.heroCards.map(c=>{const v=c.v==='id:lift'?`<span id="heroLift">—</span>`:c.v;
    return `<div class="kpi ${c.c}"><div class="k">${c.k}</div><div class="v">${v}</div><div class="s">${c.s}</div></div>`;}).join('');
  const groups=wb.groups.map(g=>`<div class="lvgroup"><div class="lvhead"><span>${g.name}</span><span>${g.levers.length} levers</span></div>
    ${g.levers.map(l=>{const step=(l.fk==='util')?0.1:1;
      return `<div class="lv"><div><div class="ln">${l.ln}</div><div class="ls">${l.ls}</div></div>
        <div class="asis">${l.asIs} →</div>
        <div><div class="tobe" style="display:flex;justify-content:space-between;align-items:center"><span id="tb_${l.id}">${lvfmt(l,l.val)}</span>
          <span class="rec" id="rc_${l.id}" style="visibility:${Math.abs(l.val-l.rec)<1e-6?'visible':'hidden'}">✓ REC</span></div>
          <input type="range" id="sl_${l.id}" min="${l.min}" max="${l.max}" step="${step}" value="${l.val}" oninput="setLever('${l.id}',this.value)"></div></div>`;}).join('')}</div>`).join('');
  const cons=wb.constraints.map((c,ci)=>`<div class="cr"><div class="cl"><span>${c.l}</span><span style="font-weight:700">${c.r} <b id="cst${ci}" style="font-size:9px;color:var(--green)">ok</b></span></div>
      <div class="bar"><i id="cbar${ci}" style="width:0%"></i><span class="mk" style="left:82%"></span></div><div class="cx">${c.x}</div></div>`).join('');
  const qr=wb.qr.map((q,i)=>`<div><div class="qk">${q[0]}</div><div class="qv" id="qr${i}">—</div></div>`).join('');
  return `<div class="crumb"><a onclick="goStep(1)">← Back to intelligence</a></div>
    <div class="sechead">${f.title.toUpperCase()} · WORKBENCH</div><h2 class="big">${wb.title}</h2><div class="lead">${wb.lead}</div>

    <div class="grid2a"><div class="card">${groups}</div>
      <div><div class="card constraints"><div class="ch"><span>GUARDRAILS &amp; CONSTRAINTS</span><span class="cs" style="margin:0">live · marker = limit</span></div>${cons}</div>
        <div class="qr"><div class="qh">Simulated vs As-Is · quick read</div><div class="qg">${qr}</div>
          <div class="foot-note">Live model · every lever updates the readout &amp; guardrails. Generate options to lock a scenario.</div></div></div></div>
    <div class="runbar"><div><b style="font-family:var(--serif);font-size:16px">Ready to model.</b>
      <div style="font-size:12px;color:var(--muted)">Run the simulator to generate three optimized lever configurations.</div></div>
      <button class="btn gold big" id="genBtn" onclick="generate()">▷ Generate Options</button></div>
    <div id="optsWrap"></div>`;
}
function generate(){const f=FLOWS[cur.flow];cur.opts=true;
  const opts=f.options.map((o,i)=>`<div class="opt ${cur.sel===i?'sel':''}" id="opt${i}" onclick="selOpt(${i})">
    <div class="oh"><span>OPTION ${String.fromCharCode(65+i)}</span>${o.tag?`<span class="otag">${o.tag}</span>`:''}</div>
    <div class="on">${o.name}</div><div class="od">${o.desc}</div>
    <div class="og">${o.g.map(x=>`<div><div class="ok">${x[0]}</div><div class="ov">${x[1]}</div></div>`).join('')}</div>
    <ul class="moves">${o.moves.map(m=>`<li>${m}</li>`).join('')}</ul>
    <div class="risk" style="color:${o.risk[1]}">Risk: ${o.risk[0]}</div></div>`).join('');
  document.getElementById('optsWrap').innerHTML=`<div style="margin-top:24px" class="fadein">
    <div class="sechead">● SIMULATION COMPLETE · 2.1s · 10,000 RUNS</div>
    <div class="lead">${f.workbench.optNote}. Pick one to preview business impact.</div>
    <div class="opts">${opts}</div>
    <div class="runbar" style="margin-top:18px"><div id="selMsg" style="font-size:13px;color:var(--muted)">Select an option to continue.</div>
      <button class="btn dark big" id="contBtn" onclick="goStep(3)" style="opacity:.5;pointer-events:none">Apply &amp; view outcomes →</button></div></div>`;
  document.getElementById('genBtn').textContent='↻ Re-generate';
  document.getElementById('optsWrap').scrollIntoView({behavior:'smooth'});}
function selOpt(i){cur.sel=i;cur.applied=i;const f=FLOWS[cur.flow],opt=f.options[i];
  f.options.forEach((_,j)=>document.getElementById('opt'+j).classList.toggle('sel',i===j));
  if(opt.levers){for(const id in opt.levers)cur.lev[id]=opt.levers[id];
    updateWB(f);                                   // snap sliders + tb labels + guardrails to this option
    const ro=readout(f,computeModel(f));
    const hero=document.getElementById('heroLift');if(hero)hero.textContent=(f.id==='genai'?opt.g[0][1]:opt.g[1][1]);
    [0,1,2].forEach(k=>{const e=document.getElementById('qr'+k);if(e)e.textContent=opt.g[k][1];}); // show option's headline numbers
    const q3=document.getElementById('qr3');if(q3)q3.textContent=ro.cells[3];}                     // margin computed live from the preset
  const b=document.getElementById('contBtn');b.style.opacity='1';b.style.pointerEvents='auto';
  document.getElementById('selMsg').innerHTML=`<b>${opt.name}</b> applied — levers set to this configuration · tweak any slider to customize`;}

/* ---------- STEP 3 (wargame): MONTE-CARLO WORKBENCH ---------- */
function wgStrength(){const wb=FLOWS.wargame.wargameWB;return wb.levers.reduce((a,l)=>a+cur.lev[l.id],0)/wb.levers.length;}
function syncStrength(){const wb=FLOWS.wargame.wargameWB;const s=wgStrength();
  const diff=wb.scenarios.find(x=>x.id===cur.scenario).diff;
  const est=(-0.2+s*2.9-diff*1.9);
  const bar=document.getElementById('wgStrength');if(bar)bar.style.width=(s*100).toFixed(0)+'%';
  const tx=document.getElementById('wgStrengthTx');if(tx)tx.textContent=Math.round(s*100)+'%';
  const pv=document.getElementById('wgPreview');if(pv)pv.textContent=(est>=0?'+':'')+est.toFixed(2)+'pp';}
function setPreset(name){const p=FLOWS.wargame.wargameWB.presets.find(x=>x.name===name);
  cur.preset=name;Object.keys(p.vals).forEach(k=>cur.lev[k]=p.vals[k]);renderFlow();}
function setScenario(id){cur.scenario=id;renderFlow();}
function setWL(id,v){cur.lev[id]=parseFloat(v);cur.preset=null;
  const e=document.getElementById('wl_'+id);if(e)e.textContent=Math.round(cur.lev[id]*100)+'%';syncStrength();}
function runMonteCarlo(){const wb=FLOWS.wargame.wargameWB;
  const diff=wb.scenarios.find(s=>s.id===cur.scenario).diff;
  cur.mc=runMC(wgStrength(),diff,10000);if(cur.step===2)renderFlow();}
function renderWargameWB(f){const wb=f.wargameWB;

  const levers=wb.levers.map(l=>`<div class="lv" style="grid-template-columns:1.3fr 1.7fr .5fr">
    <div><div class="ln">${l.ln}</div><div class="ls">${l.ls}</div></div>

  let results='';
  if(cur.mc){const mc=cur.mc;
    const wprows=wb.competitors.map(c=>{const p=mc.wp[c.name];
      return `<tr><td class="nm">${c.name}</td><td><div style="height:8px;border-radius:5px;background:var(--line2);position:relative;overflow:hidden">

    results=`<div class="card fadein" style="margin-top:18px">
      <div class="ch"><span>● SIMULATION COMPLETE · 10,000 RUNS</span><span class="badge ${mc.p50>=1.2?'ok':mc.p50>=0?'gold':'warn'}">P50 ${mc.p50>=0?'+':''}${mc.p50.toFixed(2)}pp share</span></div>

        <div class="kpi r"><div class="k">P10 · Downside</div><div class="v">${mc.p10>=0?'+':''}${mc.p10.toFixed(2)}pp</div><div class="s">pessimistic</div></div>
        <div class="kpi gold"><div class="k">P50 · Expected</div><div class="v">${mc.p50>=0?'+':''}${mc.p50.toFixed(2)}pp</div><div class="s">median</div></div>
        <div class="kpi g"><div class="k">P90 · Upside</div><div class="v">${mc.p90>=0?'+':''}${mc.p90.toFixed(2)}pp</div><div class="s">optimistic</div></div></div>

  return `<div class="crumb"><a onclick="goStep(1)">← Back to intelligence</a></div>
    <div class="sechead">COMPETITIVE WARGAME · MONTE-CARLO WORKBENCH</div><h2 class="big">${wb.title}</h2><div class="lead">${wb.lead}</div>
    <div class="grid2a">
      <div class="card"><div class="ch"><span>TCS STRATEGY POSTURE</span><div class="presets">${presets}</div></div>${levers}
        <div class="qr" style="margin-top:14px"><div class="qh">Live strategy strength</div>
          <div class="bar" style="height:9px;border-radius:5px;background:var(--line2);position:relative;overflow:hidden;margin:4px 0 8px"><i id="wgStrength" style="position:absolute;left:0;top:0;bottom:0;border-radius:5px;background:var(--gold-b);width:50%"></i></div>
          <div class="qg"><div><div class="qk">Strength</div><div class="qv"><span id="wgStrengthTx">50</span>%</div></div>
            <div><div class="qk">Pre-run P50 est.</div><div class="qv"><span id="wgPreview">+0.00pp</span></div></div></div></div></div>
      <div><div class="card"><div class="ch"><span>MARKET SCENARIO</span></div><div class="cs">Choose what the market throws at TCS.</div>${scen}</div>

          <button class="btn gold big" onclick="runMonteCarlo()">▷ Run Monte Carlo</button></div></div></div>${results}`;
}

/* ---------- STEP 4: OUTCOMES ---------- */

function renderWargameOutcomes(f){const wb=f.wargameWB,mc=cur.mc||runMC(0.6,0,10000);

    return `<tr><td class="nm">${c.name}</td><td><div style="height:8px;border-radius:5px;background:var(--line2);position:relative;overflow:hidden">
      <i style="position:absolute;left:0;top:0;bottom:0;border-radius:5px;width:${p}%;background:${p>=55?'var(--green)':p>=40?'var(--gold-b)':'var(--red)'}"></i></div></td>
      <td style="text-align:right;font-weight:800;font-family:var(--serif);color:${p>=55?'var(--green)':p>=40?'var(--gold)':'var(--red)'}">${p}%</td></tr>`;}).join('');
  const scenName=wb.scenarios.find(s=>s.id===cur.scenario).name;
  const summ=[["SHARE SHIFT · P50",(mc.p50>=0?'+':'')+mc.p50.toFixed(2)+'pp'],["PIPELINE CAPTURED","$"+mc.captured.toFixed(1)+"B"],
    ["BOOKINGS-GAP CLOSURE",Math.round(mc.gapc)+"%"],["WIN-PROB vs ACN",mc.wp["Accenture"]+"%"]]
    .map(s=>`<div class="card" style="margin:0"><div class="k" style="font-size:9.5px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;font-weight:700">${s[0]}</div>
      <div style="font-family:var(--serif);font-size:24px;font-weight:800;color:var(--green);margin:5px 0 2px">${s[1]}</div></div>`).join('');
  return `<div class="crumb"><a onclick="goStep(2)">← Back to workbench</a></div>
    <div class="sechead">WAR-GAME RESULTS · ${scenName.toUpperCase()}</div><h2 class="big">${f.outcomes.title}</h2><div class="lead">${f.outcomes.lead}</div>
    <div class="applied"><div><div class="at">● Strategy applied · ${cur.preset||'custom'} posture · ${scenName}</div>
      <div class="av">Expected <b>${mc.p50>=0?'+':''}${mc.p50.toFixed(2)}pp</b> share shift · $${mc.captured.toFixed(1)}B of $2.1B contested captured · ${mc.wp["Accenture"]}% win-probability vs Accenture</div></div>
      <button class="btn ghost" onclick="goStep(2)">← Adjust strategy</button></div>
    <div class="card"><div class="ch"><span>PROJECTED SHARE TRAJECTORY</span><span class="badge ok">P50 ${mc.p50>=0?'+':''}${mc.p50.toFixed(2)}pp</span></div>
      <div class="ct">${chart.title}</div><div class="cs">${chart.sub}</div>${lineChart(chart,860,240)}</div>
    <div class="grid2a"><div class="card"><div class="ch"><span>WIN-PROBABILITY BY COMPETITOR</span></div>
      <table class="tbl"><tbody>${wprows}</tbody></table>
      <div class="foot-note">Probability TCS out-shifts each competitor over four quarters, from 10,000 Monte-Carlo runs.</div></div>
      <div class="card"><div class="ch"><span>RECOMMENDED POSTURE</span></div>
        <div style="font-size:13px;color:var(--ink2);line-height:1.6">Under <b>${scenName}</b>, the ${cur.preset||'current'} posture yields a P50 share gain with a ${mc.wp["Accenture"]}% probability of out-shifting Accenture. Lead with outcome-based pricing on the contested top-20, ship the mid-market SKU against Infosys, and press the sovereign / deep-tech moat where peers cannot follow.</div></div></div>
    <div class="grid4">${summ}</div>
    <div class="commit"><div><div class="ck">Ready to commit</div><div class="ct">Lock this competitive posture and brief the leadership team.</div></div>
      <div style="display:flex;gap:10px"><button class="btn ghost" onclick="commit('initiative')">Save as initiative</button>
      <button class="btn gold" onclick="commit('brief')">◈ Create Board Brief</button></div></div>`;
}
function commit(kind){const f=FLOWS[cur.flow];const what=kind==='brief'?'Board Brief drafted':'Initiative saved to Memory';
  alert(what+'  ✓\n\nFlow: '+f.title+'\n'+(f.options&&cur.sel!=null?('Option: '+f.options[cur.sel].name):('Posture: '+(cur.preset||'custom')))+
    '\n\nIn the live product this writes a tracked decision to the Memory ledger and pushes the configuration to the field — where real-world results feed back to sharpen the next simulation.');}

renderLanding();
</script>
</body>
</html>
